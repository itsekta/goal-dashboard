<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goal Progress Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --green:  #22c55e; --green-bg:  #dcfce7; --green-text:  #15803d;
      --red:    #ef4444; --red-bg:    #fee2e2; --red-text:    #b91c1c;
      --amber:  #f59e0b; --amber-bg:  #fef3c7; --amber-text:  #92400e;
      --blue:   #3b82f6; --blue-bg:   #dbeafe; --blue-text:   #1d4ed8;
      --purple: #8b5cf6; --purple-bg: #ede9fe; --purple-text: #6d28d9;
      --gray:   #94a3b8; --gray-bg:   #f1f5f9; --gray-text:   #475569;
      --border: #e2e8f0;
      --card-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #f8fafc; color: #1e293b; font-size: 14px; }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white; padding: 18px 28px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .header-left h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -.02em; }
    .header-left p  { color: #94a3b8; font-size: 0.8rem; margin-top: 2px; }
    .header-right   { display: flex; align-items: center; gap: 12px; }
    .last-mod { color: #94a3b8; font-size: 0.78rem; }
    .badge {
      padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 700;
      cursor: pointer; transition: opacity .15s;
    }
    .badge:hover { opacity: .85; }
    .badge-changes { background: var(--amber); color: #000; }
    .badge-ok      { background: var(--green); color: #fff; }
    .refresh-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── NOTIFICATION BANNER ── */
    .notif-bar {
      background: var(--amber-bg); border-bottom: 2px solid var(--amber);
      padding: 10px 28px; font-size: 0.85rem; color: var(--amber-text);
      display: flex; align-items: center; justify-content: space-between;
      display: none;
    }
    .notif-bar.show { display: flex; }

    /* ── LAYOUT ── */
    .main { max-width: 1280px; margin: 0 auto; padding: 24px 24px 48px; }

    /* ── STATS CARDS ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px; margin-bottom: 28px;
    }
    .stat-card {
      background: white; border-radius: 12px; padding: 16px 18px;
      box-shadow: var(--card-shadow); border: 1px solid var(--border);
    }
    .stat-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
                  letter-spacing: .05em; color: var(--gray-text); }
    .stat-value { font-size: 1.9rem; font-weight: 800; line-height: 1.1;
                  margin: 4px 0 2px; }
    .stat-sub   { font-size: 0.75rem; color: var(--gray-text); }
    .stat-green  { border-top: 3px solid var(--green); }
    .stat-blue   { border-top: 3px solid var(--blue); }
    .stat-purple { border-top: 3px solid var(--purple); }
    .stat-amber  { border-top: 3px solid var(--amber); }

    /* ── SECTION CARDS ── */
    .section {
      background: white; border-radius: 14px; padding: 22px 24px;
      box-shadow: var(--card-shadow); border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .section-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
    .section-title  { font-size: 1rem; font-weight: 700; }
    .due-badge {
      font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 6px;
      background: var(--gray-bg); color: var(--gray-text);
    }
    .section-sub { font-size: 0.78rem; color: var(--gray-text); margin-bottom: 16px; }

    /* ── CHARTS ── */
    .chart-wrap { position: relative; height: 240px; }
    .chart-wrap-sm { position: relative; height: 160px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* ── GOAL 3 layout ── */
    .goal3-row { display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: center; }
    .rto-stat { text-align: center; min-width: 100px; }
    .rto-pct { font-size: 2.5rem; font-weight: 800; color: var(--blue); line-height: 1; }
    .rto-lbl { font-size: 0.75rem; color: var(--gray-text); margin-top: 4px; }

    /* ── GOAL 4 layout ── */
    .goal4-row { display: grid; grid-template-columns: 260px 1fr; gap: 24px; }
    .training-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 200px; }
    .training-day {
      padding: 8px 12px; border-radius: 8px; background: var(--gray-bg);
      font-size: 0.8rem; border-left: 3px solid var(--purple);
    }
    .training-day.changed { background: var(--amber-bg); border-left-color: var(--amber); }
    .training-day-date { font-weight: 600; margin-bottom: 3px; }
    .tool-tag {
      display: inline-block; background: var(--purple-bg); color: var(--purple-text);
      border-radius: 4px; padding: 1px 7px; font-size: 0.72rem; margin: 2px 2px 0 0;
    }

    /* ── OTHERS ── */
    .others-grid { display: grid; gap: 8px; }
    .other-item {
      padding: 10px 14px; border-radius: 8px; background: var(--gray-bg);
      border-left: 3px solid var(--gray);
    }
    .other-item.changed { background: var(--amber-bg); border-left-color: var(--amber); }
    .other-date { font-weight: 600; font-size: 0.8rem; color: var(--gray-text); }
    .other-act  { font-size: 0.78rem; color: #475569; margin-top: 4px; }

    /* ── CHANGE LOG PANEL ── */
    .panel-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      display: none; z-index: 200;
    }
    .panel-overlay.open { display: block; }
    .change-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 360px;
      background: white; box-shadow: -4px 0 24px rgba(0,0,0,.15);
      transform: translateX(100%); transition: transform .25s ease;
      z-index: 201; display: flex; flex-direction: column;
    }
    .change-panel.open { transform: translateX(0); }
    .panel-header {
      padding: 20px; background: #0f172a; color: white;
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-header h2 { font-size: 1rem; }
    .close-btn {
      background: none; border: none; color: white; font-size: 1.2rem;
      cursor: pointer; padding: 4px 8px; border-radius: 4px;
    }
    .close-btn:hover { background: rgba(255,255,255,.15); }
    .panel-body { flex: 1; overflow-y: auto; padding: 16px; }
    .log-empty { color: var(--gray-text); font-size: 0.85rem; text-align: center; padding: 40px 0; }
    .log-item {
      padding: 10px 12px; border-radius: 8px; background: var(--gray-bg);
      margin-bottom: 8px; border-left: 3px solid var(--amber);
    }
    .log-date { font-weight: 700; font-size: 0.82rem; }
    .log-val  { font-size: 0.75rem; color: var(--gray-text); margin-top: 4px;
                word-break: break-all; }
    .panel-footer { padding: 14px 16px; border-top: 1px solid var(--border); }
    .clear-btn {
      width: 100%; padding: 9px; background: #f1f5f9; border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
      color: var(--gray-text);
    }
    .clear-btn:hover { background: var(--border); }

    /* ── TICKET DETAILS ── */
    .ticket-toggle {
      margin-top: 14px; font-size: 0.78rem; color: var(--blue-text);
      cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
      background: none; border: none; padding: 0; font-family: inherit;
    }
    .ticket-toggle:hover { text-decoration: underline; }
    .ticket-grid {
      display: none; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px; margin-top: 12px;
    }
    .ticket-grid.open { display: grid; }
    .ticket-day {
      background: var(--gray-bg); border-radius: 8px; padding: 10px;
      border-top: 3px solid var(--gray); font-size: 0.75rem;
    }
    .ticket-day.green  { border-top-color: var(--green); }
    .ticket-day.red    { border-top-color: var(--red); }
    .ticket-day.amber  { border-top-color: var(--amber); background: var(--amber-bg); }
    .ticket-day.leave  { border-top-color: var(--gray); }
    .ticket-day-date   { font-weight: 700; margin-bottom: 5px; }
    .ticket-day-count  { font-weight: 800; font-size: 1rem; }
    .ticket-id         { color: var(--gray-text); line-height: 1.6; }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 80px; color: var(--gray-text); font-size: 0.9rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      .two-col, .goal4-row, .goal3-row { grid-template-columns: 1fr; }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h1>🎯 Goal Progress Dashboard</h1>
    <p>June 2026 · Live-synced from Excel</p>
  </div>
  <div class="header-right">
    <span class="last-mod" id="lastMod">Loading…</span>
    <div class="refresh-dot" title="Auto-refresh active"></div>
    <span class="badge badge-ok" id="changeBadge" onclick="openPanel()" style="display:none"></span>
  </div>
</div>

<!-- CHANGE NOTIFICATION BANNER -->
<div class="notif-bar" id="notifBar">
  <span>⚡ Excel file updated — dashboard refreshed with latest data. <strong id="notifCount"></strong></span>
  <button style="background:none;border:none;cursor:pointer;font-size:1rem;" onclick="closeNotif()">✕</button>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="loading">Loading dashboard…</div>
</div>

<!-- CHANGE LOG PANEL -->
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
<div class="change-panel" id="changePanel">
  <div class="panel-header">
    <h2>🔔 Change Log</h2>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody">
    <div class="log-empty">No changes detected yet.</div>
  </div>
  <div class="panel-footer">
    <button class="clear-btn" onclick="clearChanges()">Clear All Changes</button>
  </div>
</div>

<script>
const COLORS = {
  green:  '#22c55e', red: '#ef4444', amber: '#f59e0b',
  blue:   '#3b82f6', purple: '#8b5cf6',
  gray:   '#e2e8f0', grayDark: '#94a3b8',
};
const charts = {};
let prevChangeCount = 0;

// ── OPEN / CLOSE PANEL ────────────────────────────────────────────────────────
function openPanel() {
  document.getElementById('changePanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closePanel() {
  document.getElementById('changePanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function closeNotif() {
  document.getElementById('notifBar').classList.remove('show');
}

// ── CLEAR CHANGES ─────────────────────────────────────────────────────────────
async function clearChanges() {
  await fetch('/api/clear-changes', { method: 'POST' });
  document.getElementById('changeBadge').style.display = 'none';
  document.getElementById('panelBody').innerHTML = '<div class="log-empty">No changes detected yet.</div>';
  prevChangeCount = 0;
  closePanel();
}

// ── CHART HELPER ─────────────────────────────────────────────────────────────
function makeChart(id, type, labels, datasets, opts = {}) {
  if (charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  charts[id] = new Chart(ctx, {
    type,
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: {} } },
      scales: {
        x: { grid: { display: false }, ticks: { maxRotation: 45, font: { size: 10 } } },
        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } },
      },
      ...opts,
    },
  });
  return charts[id];
}

// ── BAR COLORS ────────────────────────────────────────────────────────────────
function goal1Colors(days) {
  return days.map(d =>
    d.changed   ? COLORS.amber    :
    d.is_leave  ? COLORS.grayDark :
    d.count === 0 ? COLORS.gray   :
    d.count >= 6  ? COLORS.green  : COLORS.red
  );
}

function binaryColors(days, baseColor) {
  return days.map(d => d.changed ? COLORS.amber : d.done ? baseColor : COLORS.gray);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(data) {
  const { stats, goal1, goal2, goal3, goal4, others, meta, change_log } = data;
  const dates = goal1.map(d => d.date);

  // Stats
  const g1pct = stats.goal1_tracked ? Math.round(stats.goal1_met / stats.goal1_tracked * 100) : 0;
  const g3pct = Math.round(stats.goal3_rto / stats.total_days * 100);

  document.getElementById('main').innerHTML = `
    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card stat-green">
        <div class="stat-label">Goal 1 · Ticket Days Met</div>
        <div class="stat-value" style="color:var(--green)">${stats.goal1_met}</div>
        <div class="stat-sub">of ${stats.goal1_tracked} work days &nbsp;·&nbsp; ${g1pct}% hit rate</div>
      </div>
      <div class="stat-card stat-blue">
        <div class="stat-label">Goal 2 · Engagement</div>
        <div class="stat-value" style="color:var(--blue)">${stats.goal2_engage}</div>
        <div class="stat-sub">participation days tracked</div>
      </div>
      <div class="stat-card stat-blue" style="border-top-color:#0ea5e9">
        <div class="stat-label">Goal 3 · RTO Compliance</div>
        <div class="stat-value" style="color:#0ea5e9">${g3pct}%</div>
        <div class="stat-sub">${stats.goal3_rto} of ${stats.total_days} days</div>
      </div>
      <div class="stat-card stat-purple">
        <div class="stat-label">Goal 4 · Training Days</div>
        <div class="stat-value" style="color:var(--purple)">${stats.goal4_training}</div>
        <div class="stat-sub">active learning sessions</div>
      </div>
    </div>

    <!-- GOAL 1 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">📋 Goal 1 — Minimum 6 Tickets / Day</span>
        <span class="due-badge">Due Jul 15, 2026</span>
      </div>
      <div class="section-sub">Daily TASK · SCTASK · INC · CHG tickets completed. Green = met, Red = missed, Amber = updated.</div>
      <div class="chart-wrap"><canvas id="goal1Chart"></canvas></div>
      <button class="ticket-toggle" onclick="toggleTickets()">▶ Show ticket details by day</button>
      <div class="ticket-grid" id="ticketGrid"></div>
    </div>

    <!-- GOAL 2 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">🤝 Goal 2 — Team Engagement</span>
        <span class="due-badge">Due Jul 10, 2026</span>
      </div>
      <div class="section-sub">Participation in team meetings and responsiveness to messages within 4 hours.</div>
      <div class="two-col">
        <div>
          <div style="font-size:.78rem;font-weight:600;color:var(--gray-text);margin-bottom:8px;">TEAM PARTICIPATION</div>
          <div class="chart-wrap-sm"><canvas id="engageChart"></canvas></div>
        </div>
        <div>
          <div style="font-size:.78rem;font-weight:600;color:var(--gray-text);margin-bottom:8px;">RESPONSIVENESS</div>
          <div class="chart-wrap-sm"><canvas id="respondChart"></canvas></div>
        </div>
      </div>
    </div>

    <!-- GOAL 3 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">🏢 Goal 3 — Return-to-Office Compliance</span>
        <span class="due-badge">Due Jul 15, 2026</span>
      </div>
      <div class="section-sub">Daily RTO check-ins per organizational policy.</div>
      <div class="goal3-row">
        <div class="chart-wrap-sm"><canvas id="rtoChart"></canvas></div>
        <div class="rto-stat">
          <div class="rto-pct">${g3pct}%</div>
          <div class="rto-lbl">${stats.goal3_rto} / ${stats.total_days}<br>days compliant</div>
        </div>
      </div>
    </div>

    <!-- GOAL 4 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">🧠 Goal 4 — Growth Mindset</span>
        <span class="due-badge">Due Jul 13, 2026</span>
      </div>
      <div class="section-sub">Self-improvement activities: training tools and learning sessions documented daily.</div>
      <div class="goal4-row">
        <div>
          <div style="font-size:.78rem;font-weight:600;color:var(--gray-text);margin-bottom:8px;">TOOL USAGE FREQUENCY</div>
          <div class="chart-wrap-sm"><canvas id="growthChart"></canvas></div>
        </div>
        <div>
          <div style="font-size:.78rem;font-weight:600;color:var(--gray-text);margin-bottom:8px;">TRAINING TIMELINE</div>
          <div class="training-list" id="trainingList"></div>
        </div>
      </div>
    </div>

    <!-- OTHERS -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">📌 Others — Additional Activities</span>
      </div>
      <div class="section-sub">Patching, reporting, and admin tasks tracked alongside goals.</div>
      <div class="others-grid" id="othersGrid"></div>
    </div>
  `;

  // ── GOAL 1 CHART ────────────────────────────────────────────────────────────
  const g1counts = goal1.map(d => d.is_leave ? 0 : Math.max(d.count, 0));
  const g1chart = makeChart('goal1Chart', 'bar', dates, [
    {
      data: g1counts,
      backgroundColor: goal1Colors(goal1),
      borderRadius: 5,
      label: 'Tickets',
    },
    {
      type: 'line',
      data: Array(dates.length).fill(6),
      borderColor: '#dc2626', borderWidth: 1.5,
      borderDash: [6, 4], pointRadius: 0, fill: false, label: 'Min 6',
    }
  ], {
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (ctx) => {
            const d = goal1[ctx.dataIndex];
            if (d.is_leave) return ' On Leave';
            if (d.count === 0) return ' No data';
            return ` ${d.count} tickets`;
          },
          afterBody: (items) => {
            const d = goal1[items[0].dataIndex];
            return d.tickets.length ? d.tickets.map(t => `  ${t}`) : [];
          }
        }
      }
    },
    scales: {
      x: { grid: { display: false }, ticks: { maxRotation: 45, font: { size: 9 } } },
      y: { beginAtZero: true, grid: { color: '#f1f5f9' }, max: Math.max(...g1counts) + 3 }
    }
  });

  // ── TICKET DETAILS GRID ─────────────────────────────────────────────────────
  const tg = document.getElementById('ticketGrid');
  tg.innerHTML = goal1
    .filter(d => d.count !== 0)
    .map(d => {
      const cls = d.changed ? 'amber' : d.is_leave ? 'leave' : d.count >= 6 ? 'green' : 'red';
      const tixHtml = d.is_leave
        ? '<span style="color:var(--gray-text)">On Leave 🏖</span>'
        : d.tickets.map(t => `<div class="ticket-id">${t}</div>`).join('');
      return `
        <div class="ticket-day ${cls}">
          <div class="ticket-day-date">${d.date}</div>
          <div class="ticket-day-count">${d.is_leave ? '—' : d.count + ' tickets'}</div>
          ${tixHtml}
        </div>`;
    }).join('');

  // ── GOAL 2 CHARTS ────────────────────────────────────────────────────────────
  const binaryOpts = {
    scales: {
      x: { grid: { display: false }, ticks: { maxRotation: 45, font: { size: 9 } } },
      y: { display: false, max: 1.5 }
    },
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: (c) => c.raw === 1 ? ' Done ✓' : ' Not tracked' } }
    }
  };

  makeChart('engageChart', 'bar', dates,
    [{ data: goal2.engagement.map(d => d.done ? 1 : 0),
       backgroundColor: binaryColors(goal2.engagement, COLORS.blue),
       borderRadius: 4, label: 'Engagement' }], binaryOpts);

  makeChart('respondChart', 'bar', dates,
    [{ data: goal2.responsiveness.map(d => d.done ? 1 : 0),
       backgroundColor: binaryColors(goal2.responsiveness, COLORS.blue),
       borderRadius: 4, label: 'Responsiveness' }], binaryOpts);

  // ── GOAL 3 CHART ─────────────────────────────────────────────────────────────
  makeChart('rtoChart', 'bar', dates,
    [{ data: goal3.map(d => d.done ? 1 : 0),
       backgroundColor: binaryColors(goal3, '#0ea5e9'),
       borderRadius: 4, label: 'RTO' }], binaryOpts);

  // ── GOAL 4 CHART ─────────────────────────────────────────────────────────────
  const toolCounts = {};
  goal4.forEach(d => d.tools.forEach(t => { toolCounts[t] = (toolCounts[t] || 0) + 1; }));
  const toolNames = Object.keys(toolCounts);
  const toolVals  = toolNames.map(t => toolCounts[t]);

  if (toolNames.length) {
    makeChart('growthChart', 'bar', toolNames,
      [{ data: toolVals,
         backgroundColor: COLORS.purple,
         borderRadius: 5, label: 'Days' }],
      {
        indexAxis: 'y',
        plugins: { legend: { display: false },
                   tooltip: { callbacks: { label: c => ` ${c.raw} day${c.raw > 1 ? 's' : ''}` } } },
        scales: {
          x: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } },
          y: { grid: { display: false }, ticks: { font: { size: 10 } } }
        }
      }
    );
  }

  // Training timeline
  document.getElementById('trainingList').innerHTML = goal4.map(d => `
    <div class="training-day ${d.changed ? 'changed' : ''}">
      <div class="training-day-date">${d.changed ? '🟡 ' : ''}${d.date}</div>
      <div>${d.tools.map(t => `<span class="tool-tag">${t}</span>`).join('')}</div>
    </div>
  `).join('') || '<div style="color:var(--gray-text);font-size:.8rem">No training recorded yet.</div>';

  // Others grid
  const allActs = {};
  others.forEach(d => d.activities.forEach(a => {
    if (!allActs[a]) allActs[a] = { dates: [], changed: false };
    allActs[a].dates.push(d.date);
    if (d.changed) allActs[a].changed = true;
  }));
  document.getElementById('othersGrid').innerHTML = Object.entries(allActs).map(([act, info]) => `
    <div class="other-item ${info.changed ? 'changed' : ''}">
      <div class="other-date">${info.changed ? '🟡 ' : ''}${act}</div>
      <div class="other-act">Active on: ${info.dates.join(' · ')}</div>
    </div>
  `).join('') || '<div style="color:var(--gray-text);font-size:.8rem">No additional activities.</div>';

  // ── META / HEADER ───────────────────────────────────────────────────────────
  document.getElementById('lastMod').textContent = `Updated: ${meta.last_modified}`;

  const badge = document.getElementById('changeBadge');
  if (change_log.length > 0) {
    badge.textContent = `🔔 ${change_log.length} update${change_log.length > 1 ? 's' : ''}`;
    badge.style.display = 'inline-block';
  }

  // Change log panel
  document.getElementById('panelBody').innerHTML = change_log.length
    ? change_log.map(c => `
        <div class="log-item">
          <div class="log-date">📅 ${c.date}</div>
          <div class="log-val">
            <span style="color:var(--red-text)">Before:</span> ${c.from || '—'}<br>
            <span style="color:var(--green-text)">After:</span> ${c.to || '—'}
          </div>
        </div>`).join('')
    : '<div class="log-empty">No changes detected yet.<br><br>Update the Excel file and the dashboard will highlight what changed.</div>';

  // Show notification if new changes
  if (meta.file_changed && prevChangeCount > 0) {
    const bar = document.getElementById('notifBar');
    document.getElementById('notifCount').textContent = `${change_log.length} change(s) detected.`;
    bar.classList.add('show');
    setTimeout(() => bar.classList.remove('show'), 6000);
  }
  prevChangeCount = change_log.length;
}

// ── TICKET TOGGLE ─────────────────────────────────────────────────────────────
function toggleTickets() {
  const grid = document.getElementById('ticketGrid');
  const btn  = document.querySelector('.ticket-toggle');
  const open = grid.classList.toggle('open');
  btn.textContent = (open ? '▼ Hide' : '▶ Show') + ' ticket details by day';
}

// ── FETCH & POLL ──────────────────────────────────────────────────────────────
async function refresh() {
  try {
    const res  = await fetch('/api/data');
    const data = await res.json();
    render(data);
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
